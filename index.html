<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Sui Hub Site</title><style>:root{--bg:#0f1724;--card:#0b1220;--muted:#9aa4b2;--accent:#7c3aed;--glass:rgba(255,255,255,0.03);--glass2:rgba(255,255,255,0.02);--text:#e6eef6}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial;background:var(--bg);color:var(--text)}.topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:var(--card)}.siteTitle{font-weight:700}.profileBtn{width:40px;height:40px;border-radius:50%;background:#7c3aed;display:grid;place-items:center;cursor:pointer;position:relative}.profilePopup{position:absolute;top:50px;right:0;background:var(--card);border-radius:14px;padding:16px;min-width:220px;display:none;flex-direction:column;gap:10px;z-index:99;box-shadow:0 6px 30px rgba(0,0,0,0.6)}.profilePopup img{width:50px;height:50px;border-radius:50%;object-fit:cover}.verified{display:inline-block;background:#0f1724;color:#fff;font-size:12px;padding:2px 6px;border-radius:6px;margin-left:6px}.tabs{display:flex;gap:10px;margin:10px}.tab{padding:8px 14px;border-radius:8px;cursor:pointer;background:var(--glass);}.tab.active{background:var(--accent);color:#fff}.card{background:linear-gradient(180deg,var(--glass),var(--glass2));border-radius:14px;padding:18px;box-shadow:0 6px 30px rgba(2,6,23,0.6);border:1px solid rgba(255,255,255,0.03);margin:10px 0}.cta-row{display:flex;gap:12px;align-items:center;justify-content:flex-start}.btn{appearance:none;border:0;padding:8px 12px;border-radius:10px;cursor:pointer;font-weight:600;transition:.1s}.btn-primary{background:linear-gradient(90deg,var(--accent),#5b21b6);color:#fff}pre{background:#020617;padding:14px;border-radius:10px;overflow:auto;margin:0;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px}#editOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center}#editOverlay .editCard{background:var(--card);padding:20px;border-radius:14px;max-width:400px;width:90%;display:flex;flex-direction:column;gap:10px}</style></head><body><div class="topbar"><div class="siteTitle">Sui Hub Site</div><div class="profileBtn" id="profileBtn"><img id="profileImg" src="https://www.gstatic.com/images/branding/product/1x/avatar_square_blue_512dp.png" style="width:32px;height:32px;border-radius:50%"/></div></div><div class="profilePopup" id="profilePopup"><div id="pfInfo" style="display:flex;align-items:center;gap:10px"><img id="pfPfp" src="" alt="Foto"/><div><div id="pfName"></div><div id="pfVerified" class="verified" style="display:none">VERIFICADO</div></div></div><div id="pfBio"></div><div id="pfDate"></div><hr/><button id="editProfileBtn" class="btn btn-primary">Editar Perfil</button><label class="btn btn-primary">Tema <input type="checkbox" id="themeToggle"/></label><button id="logoutProfileBtn" class="btn btn-primary">Desconectar</button></div><div class="tabs"><div class="tab active" data-tab="script">Script</div></div><div class="card" id="tabContent"><h3>Script</h3><pre id="codeArea">loadstring(game:HttpGet("https://haxhell.com/raw/56-demonfall-sui-hub"))()</pre><div class="cta-row"><button id="copyBtn" class="btn btn-primary">Copiar</button></div></div><div id="editOverlay"><div class="editCard"><h3>Editar Perfil</h3><input type="text" id="editName" placeholder="Nome"/><textarea id="editBio" placeholder="Bio"></textarea><input type="file" id="editPhoto"/><button id="saveProfileBtn" class="btn btn-primary">Salvar</button><button id="closeEditBtn" class="btn btn-primary">Fechar</button></div></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";import{getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";import{getFirestore,doc,setDoc,getDoc,collection,query,where,getDocs}from"https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";const firebaseConfig={apiKey:"AIzaSyBG3D3ieH0f-3608DcWnIIfQS_n5tP7EHE",authDomain:"sui-hub.firebaseapp.com",projectId:"sui-hub",storageBucket:"sui-hub.firebasestorage.app",messagingSenderId:"590135716171",appId:"1:590135716171:web:521bbb28c8ec4eae2e60ce",measurementId:"G-G9YXZJV7LE"};const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app),provider=new GoogleAuthProvider();let currentUser=null,ownerUID="gV06HRh6saXgXkPWG2FquFME2Or1";const profileBtn=document.getElementById("profileBtn"),profilePopup=document.getElementById("profilePopup"),editOverlay=document.getElementById("editOverlay"),pfPfp=document.getElementById("pfPfp"),pfName=document.getElementById("pfName"),pfVerified=document.getElementById("pfVerified"),pfBio=document.getElementById("pfBio"),pfDate=document.getElementById("pfDate"),themeToggle=document.getElementById("themeToggle"),tabContent=document.getElementById("tabContent");onAuthStateChanged(auth,u=>{currentUser=u;if(u){profileBtn.style.display="grid";updateProfileUI();}else{profileBtn.style.display="none"}});profileBtn.onclick=()=>profilePopup.style.display=profilePopup.style.display==="flex"?"none":"flex";document.getElementById("logoutProfileBtn").onclick=()=>signOut(auth).catch(console.log);document.getElementById("editProfileBtn").onclick=()=>editOverlay.style.display="flex";document.getElementById("closeEditBtn").onclick=()=>editOverlay.style.display="none";document.getElementById("copyBtn").onclick=()=>navigator.clipboard.writeText(document.getElementById("codeArea").textContent);themeToggle.onchange=()=>{document.body.style.background=themeToggle.checked?"#fff":"var(--bg)"};async function updateProfileUI(){if(!currentUser)return;const uRef=doc(db,"users",currentUser.uid),uSnap=await getDoc(uRef),data=uSnap.exists()?uSnap.data():{name:"",bio:"",photo:"",created:new Date().toISOString()};pfName.textContent=data.name||currentUser.displayName;pfBio.textContent=data.bio||"";pfDate.textContent="Entrou "+new Date(data.created).toLocaleDateString("pt-BR",{day:'2-digit',month:'long',year:'numeric'});pfVerified.style.display=currentUser.uid===ownerUID?"inline-block":"none";pfPfp.src=data.photo||"https://www.gstatic.com/images/branding/product/1x/avatar_square_blue_512dp.png"}document.getElementById("saveProfileBtn").onclick=async()=>{const n=document.getElementById("editName").value.trim(),b=document.getElementById("editBio").value.trim(),f=document.getElementById("editPhoto").files[0];if(!n){alert("Nome obrigatório");return}const q=query(collection(db,"users"),where("name","==",n)),qs=await getDocs(q);if(!qs.empty&&n!==pfName.textContent){alert("Nome já existe");return}if(f){if(f.size>1024*1024){alert("Máx 1MB");return}const r=new FileReader();r.onload=async()=>{await setDoc(doc(db,"users",currentUser.uid),{name:n,bio:b,photo:r.result,created:new Date().toISOString()},{merge:true});updateProfileUI();editOverlay.style.display="none"};r.readAsDataURL(f)}else{await setDoc(doc(db,"users",currentUser.uid),{name:n,bio:b},{merge:true});updateProfileUI();editOverlay.style.display="none"}};</script></body></html>
