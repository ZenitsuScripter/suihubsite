<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copiar UID</title>
<style>
body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;background:#0f1724;color:#e6eef6;flex-direction:column}
#uidBox{margin:12px 0;padding:10px 14px;border-radius:8px;background:#1b1f2a;border:1px solid #333;word-break:break-all}
button{padding:10px 16px;border:none;border-radius:8px;background:#7c3aed;color:#fff;cursor:pointer;font-weight:600;transition:0.2s}
button:active{transform:scale(0.96)}
</style>
</head>
<body>
<h2>UID do Usuário</h2>
<div id="uidBox">Faça login para ver seu UID</div>
<button id="copyBtn">Copiar UID</button>
<button id="loginBtn">Login Google</button>
<button id="logoutBtn" style="display:none;">Sair</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBG3D3ieH0f-3608DcWnIIfQS_n5tP7EHE",
authDomain: "sui-hub.firebaseapp.com",
projectId: "sui-hub",
storageBucket: "sui-hub.firebasestorage.app",
messagingSenderId: "590135716171",
appId: "1:590135716171:web:521bbb28c8ec4eae2e60ce",
measurementId: "G-G9YXZJV7LE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const uidBox = document.getElementById("uidBox");
const copyBtn = document.getElementById("copyBtn");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");

loginBtn.onclick = ()=>signInWithPopup(auth,provider).catch(console.log);
logoutBtn.onclick = ()=>signOut(auth).catch(console.log);

onAuthStateChanged(auth,user=>{
if(user){
uidBox.textContent=user.uid;
loginBtn.style.display="none";
logoutBtn.style.display="inline-block";
}else{
uidBox.textContent="Faça login para ver seu UID";
loginBtn.style.display="inline-block";
logoutBtn.style.display="none";
}
});

copyBtn.onclick=()=>{navigator.clipboard.writeText(uidBox.textContent)}
</script>
</body>
</html>
