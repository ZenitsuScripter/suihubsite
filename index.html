<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sui Hub Site</title>
<style>
  :root{
    --bg:#071028; --card:#0b1220; --muted:#9aa4b2; --accent:#7c3aed; --glass:rgba(255,255,255,0.03);
    --glass2:rgba(255,255,255,0.02); --text:#e6eef6;
  }
  body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  body.light{--bg:#f6f8fb;--card:#ffffff;--muted:#6b7280;--text:#0b1220}
  .wrap{max-width:1100px;margin:28px auto;padding:18px}
  .card{background:linear-gradient(180deg,var(--glass),var(--glass2));border-radius:12px;padding:16px;box-shadow:0 8px 30px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.03)}
  .btn{appearance:none;border:0;padding:8px 12px;border-radius:10px;cursor:pointer;font-weight:600}
  .btn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted)}
  .btn-primary{background:linear-gradient(90deg,var(--accent),#5b21b6);color:#fff}
  .hidden{display:none}
  pre{background:#020617;padding:14px;border-radius:8px;color:var(--text);overflow:auto;font-family:ui-monospace,Consolas,monospace}
</style>
</head>
<body>
<div class="wrap">
  <!-- ABA LOGIN -->
  <div id="loginTab">
    <div class="card" style="text-align:center">
      <h2>Bem-vindo ao Sui Hub</h2>
      <p class="muted">Faça login para acessar o script loader — Demonfall</p>
      <button id="loginBtn" class="btn btn-primary">Login Google</button>
    </div>
  </div>

  <!-- ABA SCRIPT (inicialmente escondida) -->
  <div id="scriptTab" class="hidden">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h2>Sui Hub — Demonfall</h2>
        <div class="small muted">Leve • Rápido • Suporte</div>
      </div>
      <hr style="margin:12px 0;border:none;border-top:1px solid rgba(255,255,255,0.04)">
      <pre id="codeArea">loadstring(game:HttpGet("https://haxhell.com/raw/56-demonfall-sui-hub"))()</pre>
      <div style="margin-top:12px;display:flex;gap:10px;align-items:center">
        <button id="copyBtn" class="btn btn-primary">Copiar</button>
        <button id="downloadBtn" class="btn btn-ghost">Baixar</button>
        <button id="viewBtn" class="btn btn-ghost">Visualizar</button>
        <div id="statusMsg" class="small muted" style="margin-left:12px"></div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase + App JS -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBG3D3ieH0f-3608DcWnIIfQS_n5tP7EHE",
  authDomain: "sui-hub.firebaseapp.com",
  projectId: "sui-hub",
  storageBucket: "sui-hub.firebasestorage.app",
  messagingSenderId: "590135716171",
  appId: "1:590135716171:web:521bbb28c8ec4eae2e60ce",
  measurementId: "G-G9YXZJV7LE"
};

const OWNER_UID = "gV06HRh6saXgXkPWG2FME2Or1";
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// DOM
const loginBtn = document.getElementById("loginBtn");
const loginTab = document.getElementById("loginTab");
const scriptTab = document.getElementById("scriptTab");
const codeArea = document.getElementById("codeArea");
const copyBtn = document.getElementById("copyBtn");
const downloadBtn = document.getElementById("downloadBtn");
const viewBtn = document.getElementById("viewBtn");
const statusMsg = document.getElementById("statusMsg");

// Funções utilitárias
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Script actions
copyBtn.addEventListener("click", ()=> {
  navigator.clipboard.writeText(codeArea.textContent).then(()=>{ statusMsg.textContent = "Copiado!"; setTimeout(()=>statusMsg.textContent="",1200);});
});
downloadBtn.addEventListener("click", ()=> {
  const blob = new Blob([codeArea.textContent], { type: "text/plain" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "sui-hub-demonfall.lua"; document.body.appendChild(a); a.click(); a.remove();
});
viewBtn.addEventListener("click", ()=> {
  const w = window.open(); w.document.write("<pre style='white-space:pre-wrap'>"+escapeHtml(codeArea.textContent)+"</pre>"); w.document.close();
});

// Login
loginBtn.onclick = ()=> signInWithPopup(auth, provider).catch(e=>alert("Erro login: "+e.message));

onAuthStateChanged(auth, async (user)=>{
  if(user){
    // login bem-sucedido: mostra aba do script
    loginTab.classList.add("hidden");
    scriptTab.classList.remove("hidden");
    // aqui você pode carregar o perfil ou outras ações
    console.log("Usuário logado:", user.displayName, user.uid);
  } else {
    // usuário não logado
    loginTab.classList.remove("hidden");
    scriptTab.classList.add("hidden");
  }
});
</script>
</body>
</html>
