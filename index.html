<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG Character System</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-dark: #0f0f0f;
  --bg-secondary: #1a1a1a;
  --bg-tertiary: #242424;
  --bg-hover: #2a2a2a;
  --text-primary: #ffffff;
  --text-secondary: #a3a3a3;
  --text-tertiary: #737373;
  --accent: #ef4444;
  --accent-hover: #dc2626;
  --border: #2a2a2a;
  --radius: 12px;
  --success: #22c55e;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Login Screen */
.login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
}

.login-box {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 3rem;
  text-align: center;
  max-width: 400px;
  width: 90%;
}

.login-logo {
  font-size: 2.5rem;
  font-weight: 800;
  margin-bottom: 0.5rem;
  background: linear-gradient(135deg, var(--accent), #6366f1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.login-subtitle {
  color: var(--text-secondary);
  margin-bottom: 2rem;
}

.btn-google {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  width: 100%;
  padding: 1rem;
  background: white;
  color: #1f1f1f;
  border: none;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: transform 0.2s;
}

.btn-google:hover {
  transform: scale(1.02);
}

/* Main App */
.app-container {
  display: none;
}

.app-container.active {
  display: flex;
}

/* Header */
.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 1.5rem;
  font-weight: 800;
}

.logo .accent {
  color: var(--accent);
}

.user-info {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.user-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid var(--accent);
}

.btn-logout {
  padding: 0.5rem 1rem;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.2s;
}

.btn-logout:hover {
  background: var(--bg-hover);
}

/* Main Content */
.main-content {
  display: flex;
  height: calc(100vh - 73px);
}

/* Sidebar */
.sidebar {
  width: 280px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  padding: 1.5rem;
  overflow-y: auto;
}

.sidebar h2 {
  font-size: 1.125rem;
  margin-bottom: 1rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.rpg-list {
  list-style: none;
}

.rpg-item {
  padding: 1rem;
  margin-bottom: 0.5rem;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.2s;
}

.rpg-item:hover {
  background: var(--bg-hover);
  border-color: var(--accent);
}

.rpg-item.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.rpg-item h3 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.25rem;
}

.rpg-item p {
  font-size: 0.875rem;
  opacity: 0.8;
}

/* Content Area */
.content-area {
  flex: 1;
  padding: 2rem;
  overflow-y: auto;
}

.section {
  display: none;
}

.section.active {
  display: block;
  animation: fadeIn 0.3s;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-header {
  margin-bottom: 2rem;
}

.section-header h1 {
  font-size: 2rem;
  margin-bottom: 0.5rem;
}

.section-header p {
  color: var(--text-secondary);
}

/* Character Creation */
.creation-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem;
  margin-bottom: 2rem;
}

.creation-card h2 {
  font-size: 1.5rem;
  margin-bottom: 1.5rem;
}

.btn-roll {
  padding: 1rem 2rem;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-roll:hover {
  background: var(--accent-hover);
}

.btn-roll:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.roll-results {
  margin-top: 2rem;
  display: none;
}

.roll-results.show {
  display: block;
}

.result-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.result-item {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
}

.result-item h3 {
  font-size: 0.875rem;
  color: var(--text-secondary);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}

.result-item p {
  font-size: 1.25rem;
  font-weight: 600;
}

.character-form {
  display: grid;
  gap: 1rem;
  margin-top: 2rem;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.form-group label {
  font-weight: 600;
  font-size: 0.875rem;
  color: var(--text-secondary);
}

.form-group input,
.form-group select,
.form-group textarea {
  padding: 0.75rem;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: inherit;
}

.form-group textarea {
  resize: vertical;
  min-height: 100px;
}

.btn-create {
  padding: 1rem 2rem;
  background: var(--success);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 1rem;
}

.btn-create:hover {
  background: #16a34a;
}

/* Character List */
.characters-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1rem;
  margin-top: 2rem;
}

.character-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  cursor: pointer;
  transition: all 0.2s;
}

.character-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}

.character-card h3 {
  font-size: 1.25rem;
  margin-bottom: 0.5rem;
}

.character-card .race {
  color: var(--accent);
  font-size: 0.875rem;
  margin-bottom: 1rem;
}

.character-stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.5rem;
  font-size: 0.875rem;
  color: var(--text-secondary);
}

/* Character Sheet */
.sheet-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2rem;
}

.btn-back {
  padding: 0.75rem 1.5rem;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.2s;
}

.btn-back:hover {
  background: var(--bg-hover);
}

.sheet-content {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem;
}

.sheet-section {
  margin-bottom: 2rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--border);
}

.sheet-section:last-child {
  border-bottom: none;
}

.sheet-section h2 {
  font-size: 1.25rem;
  margin-bottom: 1rem;
}

.attributes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
}

.attribute-box {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.attribute-box label {
  font-weight: 600;
  color: var(--text-secondary);
}

.attribute-box input {
  width: 60px;
  padding: 0.5rem;
  background: var(--bg-dark);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  text-align: center;
  font-weight: 600;
}

.btn-save {
  padding: 1rem 2rem;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 1rem;
}

.btn-save:hover {
  background: var(--accent-hover);
}

.toast {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  padding: 1rem 1.5rem;
  border-radius: var(--radius);
  font-weight: 600;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.3s;
  z-index: 1000;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sidebar {
    width: 100%;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }

  .main-content {
    flex-direction: column;
    height: auto;
  }

  .result-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">RPG System</div>
    <p class="login-subtitle">Crie e gerencie suas fichas de personagem</p>
    <button id="btnLogin" class="btn-google">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Entrar com Google
    </button>
  </div>
</div>

<!-- Main App -->
<div id="appContainer" class="app-container">
  <header class="header">
    <div class="logo">RPG<span class="accent">System</span></div>
    <div class="user-info">
      <img id="userAvatar" class="user-avatar" src="" alt="">
      <span id="userName"></span>
      <button id="btnLogout" class="btn-logout">Sair</button>
    </div>
  </header>

  <div class="main-content">
    <aside class="sidebar">
      <h2>Campanhas</h2>
      <ul class="rpg-list">
        <li class="rpg-item active" data-rpg="ordem-magica">
          <h3>Ordem Mágica</h3>
          <p>Sistema de magia e ordem</p>
        </li>
      </ul>
    </aside>

    <div class="content-area">
      <!-- Character Creation Section -->
      <section id="sectionCreate" class="section active">
        <div class="section-header">
          <h1>Criar Personagem</h1>
          <p>Role os dados para gerar seu personagem automaticamente</p>
        </div>

        <div class="creation-card">
          <h2>Geração de Personagem</h2>
          <button id="btnRollCharacter" class="btn-roll">🎲 Rolar Personagem</button>

          <div id="rollResults" class="roll-results">
            <div class="result-grid" id="resultGrid"></div>

            <form id="characterForm" class="character-form">
              <div class="form-group">
                <label>Nome do Personagem *</label>
                <input type="text" id="charName" required>
              </div>
              <div class="form-group">
                <label>Idade</label>
                <input type="number" id="charAge" min="1">
              </div>
              <div class="form-group">
                <label>História / Personalidade</label>
                <textarea id="charHistory"></textarea>
              </div>
              <button type="submit" class="btn-create">✓ Criar Personagem</button>
            </form>
          </div>
        </div>

        <div id="charactersList" class="characters-list"></div>
      </section>

      <!-- Character Sheet Section -->
      <section id="sectionSheet" class="section">
        <div class="sheet-header">
          <button id="btnBackToList" class="btn-back">← Voltar</button>
          <h1 id="sheetTitle"></h1>
        </div>

        <div class="sheet-content" id="sheetContent"></div>
      </section>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBG3D3ieH0f-3608DcWnIIfQS_n5tP7EHE",
  authDomain: "sui-hub.firebaseapp.com",
  projectId: "sui-hub",
  storageBucket: "sui-hub.firebasestorage.app",
  messagingSenderId: "590135716171",
  appId: "1:590135716171:web:521bbb28c8ec4eae2e60ce"
});

const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser = null;
let currentCharacterData = null;
let currentCharacterId = null;

const $ = id => document.getElementById(id);
const showToast = msg => {
  $('toast').textContent = msg;
  $('toast').classList.add('show');
  setTimeout(() => $('toast').classList.remove('show'), 3000);
};

// Race table
const races = {
  1: "Aasimar", 2: "Draconato", 3: "Draconato", 4: "Draconato",
  5: "Anão", 19: "Anão",
  20: "Elfo", 29: "Elfo",
  31: "Aetheborn", 32: "Aetheborn", 33: "Aetheborn",
  34: "Gnomo", 39: "Gnomo",
  40: "Thri Kreen", 41: "Thri Kreen",
  42: "Orc", 43: "Orc",
  44: "Vampiro", 50: "Vampiro",
  51: "Homem-Rato",
  52: "Humano", 90: "Humano",
  91: "Kenku",
  92: "Quarterra",
  93: "Tabaxi", 94: "Tabaxi",
  95: "Tiefling", 98: "Tiefling",
  99: "Myconidae",
  100: "Escolha"
};

const backgrounds = {
  1: "Acólito", 7: "Acólito",
  8: "Charlatão", 14: "Charlatão",
  15: "Criminoso", 21: "Criminoso",
  22: "Artista", 28: "Artista",
  29: "Herói do Povo", 35: "Herói do Povo",
  36: "Artesão da Guilda", 42: "Artesão da Guilda",
  43: "Eremita", 49: "Eremita",
  50: "Nobre", 56: "Nobre",
  57: "Forasteiro", 63: "Forasteiro",
  64: "Sábio", 70: "Sábio",
  71: "Marinheiro", 77: "Marinheiro",
  78: "Soldado", 84: "Soldado",
  85: "Órfão", 91: "Órfão",
  92: "Escolha", 100: "Escolha"
};

const orders = {
  1: "Experiente", 33: "Experiente",
  34: "Combatente", 66: "Combatente",
  67: "Mágico", 100: "Mágico"
};

const magicCores = ["Interno (Gerador)", "Condutor", "Pactuada", "Tecnomágico", "Ritualístico", "Instintiva"];

function rollD100() {
  return Math.floor(Math.random() * 100) + 1;
}

function rollD12() {
  return Math.floor(Math.random() * 12) + 1;
}

function rollD8() {
  return Math.floor(Math.random() * 8) + 1;
}

function rollD6() {
  return Math.floor(Math.random() * 6) + 1;
}

function getRaceFromRoll(roll) {
  for (let key in races) {
    if (roll <= parseInt(key)) return races[key];
  }
  return "Humano";
}

function getBackgroundFromRoll(roll) {
  for (let key in backgrounds) {
    if (roll <= parseInt(key)) return backgrounds[key];
  }
  return "Escolha";
}

function getOrderFromRoll(roll) {
  for (let key in orders) {
    if (roll <= parseInt(key)) return orders[key];
  }
  return "Mágico";
}

$('btnLogin').addEventListener('click', () => {
  signInWithPopup(auth, provider).catch(err => {
    showToast("❌ Erro ao fazer login");
  });
});

$('btnLogout').addEventListener('click', () => {
  signOut(auth);
  showToast("✓ Logout realizado");
});

onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  if (user) {
    $('loginScreen').style.display = 'none';
    $('appContainer').classList.add('active');
    $('userAvatar').src = user.photoURL || '';
    $('userName').textContent = user.displayName || user.email;
    await loadCharacters();
  } else {
    $('loginScreen').style.display = 'flex';
    $('appContainer').classList.remove('active');
  }
});

$('btnRollCharacter').addEventListener('click', () => {
  const raceRoll = rollD100();
  const backgroundRoll = rollD100();
  const orderRoll = rollD100();
  
  const race = getRaceFromRoll(raceRoll);
  const background = getBackgroundFromRoll(backgroundRoll);
  const order = getOrderFromRoll(orderRoll);
  const magicCore = magicCores[Math.floor(Math.random() * magicCores.length)];
  
  const attributes = {
    corpo: 1,
    mente: 1,
    destreza: 1,
    carisma: 1,
    essencia: 1
  };
  
  // Distribuir +3 pontos aleatoriamente
  for (let i = 0; i < 3; i++) {
    const attrs = Object.keys(attributes);
    const randomAttr = attrs[Math.floor(Math.random() * attrs.length)];
    attributes[randomAttr]++;
  }
  
  const pvBase = attributes.corpo;
  const pv = rollD6() * pvBase + attributes.corpo;
  
  const sanidadeBase = attributes.mente;
  const sanidade = 22 + (rollD8() * sanidadeBase) + attributes.mente;
  
  const manaBase = attributes.essencia;
  const mana = rollD8() * manaBase + attributes.essencia;
  
  currentCharacterData = {
    race,
    background,
    order,
    magicCore,
    attributes,
    pv,
    pvMax: pv,
    sanidade,
    sanidadeMax: sanidade,
    mana,
    manaMax: mana,
    nivel: 1
  };
  
  const resultGrid = $('resultGrid');
  resultGrid.innerHTML = `
    <div class="result-item">
      <h3>Raça</h3>
      <p>${race}</p>
    </div>
    <div class="result-item">
      <h3>Antecedente</h3>
      <p>${background}</p>
    </div>
    <div class="result-item">
      <h3>Ordem</h3>
      <p>${order}</p>
    </div>
    <div class="result-item">
      <h3>Núcleo de Magia</h3>
      <p>${magicCore}</p>
    </div>
    <div class="result-item">
      <h3>Corpo</h3>
      <p>${attributes.corpo}</p>
    </div>
    <div class="result-item">
      <h3>Mente</h3>
      <p>${attributes.mente}</p>
    </div>
    <div class="result-item">
      <h3>Destreza</h3>
      <p>${attributes.destreza}</p>
    </div>
    <div class="result-item">
      <h3>Carisma</h3>
      <p>${attributes.carisma}</p>
    </div>
    <div class="result-item">
      <h3>Essência</h3>
      <p>${attributes.essencia}</p>
    </div>
    <div class="result-item">
      <h3>PV</h3>
      <p>${pv}</p>
    </div>
    <div class="result-item">
      <h3>Sanidade</h3>
      <p>${sanidade}</p>
    </div>
    <div class="result-item">
      <h3>Mana</h3>
      <p>${mana}</p>
    </div>
  `;
  
  $('rollResults').classList.add('show');
  showToast("🎲 Personagem gerado!");
});

$('characterForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  if (!currentUser || !currentCharacterData) return;
  
  const name = $('charName').value.trim();
  const age = $('charAge').value;
  const history = $('charHistory').value.trim();
  
  if (!name) {
    showToast("❌ Nome é obrigatório");
    return;
  }
  
  const characterId = Date.now().toString();
  const characterData = {
    ...currentCharacterData,
    name,
    age: age || null,
    history: history || "",
    userId: currentUser.uid,
    rpgType: "ordem-magica",
    createdAt: new Date().toISOString()
  };
  
  try {
    await setDoc(doc(db, "characters", characterId), characterData);
    showToast("✓ Personagem criado com sucesso!");
    
    $('charName').value = '';
    $('charAge').value = '';
    $('charHistory').value = '';
    $('rollResults').classList.remove('show');
    currentCharacterData = null;
    
    await loadCharacters();
  } catch (err) {
    showToast("❌ Erro ao criar personagem");
    console.error(err);
  }
});

async function loadCharacters() {
  if (!currentUser) return;
  
  const q = query(
    collection(db, "characters"),
    where("userId", "==", currentUser.uid),
    where("rpgType", "==", "ordem-magica")
  );
  
  const snapshot = await getDocs(q);
  const charactersList = $('charactersList');
  
  if (snapshot.empty) {
    charactersList.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">Nenhum personagem criado ainda</p>';
    return;
  }
  
  charactersList.innerHTML = '';
  snapshot.forEach(doc => {
    const data = doc.data();
    const card = document.createElement('div');
    card.className = 'character-card';
    card.innerHTML = `
      <h3>${data.name}</h3>
      <p class="race">${data.race} • ${data.order}</p>
      <div class="character-stats">
        <span>Nível ${data.nivel}</span>
        <span>PV ${data.pv}/${data.pvMax}</span>
        <span>Mana ${data.mana}/${data.manaMax}</span>
        <span>Sanidade ${data.sanidade}/${data.sanidadeMax}</span>
      </div>
    `;
    card.addEventListener('click', () => viewCharacter(doc.id, data));
    charactersList.appendChild(card);
  });
}

function viewCharacter(id, data) {
  currentCharacterId = id;
  
  $('sectionCreate').classList.remove('active');
  $('sectionSheet').classList.add('active');
  $('sheetTitle').textContent = data.name;
  
  const sheetContent = $('sheetContent');
  sheetContent.innerHTML = `
    <div class="sheet-section">
      <h2>Informações Básicas</h2>
      <div class="result-grid">
        <div class="result-item">
          <h3>Raça</h3>
          <p>${data.race}</p>
        </div>
        <div class="result-item">
          <h3>Antecedente</h3>
          <p>${data.background}</p>
        </div>
        <div class="result-item">
          <h3>Ordem</h3>
          <p>${data.order}</p>
        </div>
        <div class="result-item">
          <h3>Núcleo de Magia</h3>
          <p>${data.magicCore}</p>
        </div>
        <div class="result-item">
          <h3>Idade</h3>
          <p>${data.age || 'Não definida'}</p>
        </div>
        <div class="result-item">
          <h3>Nível</h3>
          <p>${data.nivel}</p>
        </div>
      </div>
    </div>
    
    <div class="sheet-section">
      <h2>Atributos</h2>
      <div class="attributes-grid">
        <div class="attribute-box">
          <label>Corpo</label>
          <input type="number" id="editCorpo" value="${data.attributes.corpo}" min="1">
        </div>
        <div class="attribute-box">
          <label>Mente</label>
          <input type="number" id="editMente" value="${data.attributes.mente}" min="1">
        </div>
        <div class="attribute-box">
          <label>Destreza</label>
          <input type="number" id="editDestreza" value="${data.attributes.destreza}" min="1">
        </div>
        <div class="attribute-box">
          <label>Carisma</label>
          <input type="number" id="editCarisma" value="${data.attributes.carisma}" min="1">
        </div>
        <div class="attribute-box">
          <label>Essência</label>
          <input type="number" id="editEssencia" value="${data.attributes.essencia}" min="1">
        </div>
      </div>
    </div>
    
    <div class="sheet-section">
      <h2>Recursos</h2>
      <div class="attributes-grid">
        <div class="attribute-box">
          <label>PV Atual</label>
          <input type="number" id="editPV" value="${data.pv}" min="0" max="${data.pvMax}">
        </div>
        <div class="attribute-box">
          <label>PV Máximo</label>
          <input type="number" id="editPVMax" value="${data.pvMax}" min="1">
        </div>
        <div class="attribute-box">
          <label>Mana Atual</label>
          <input type="number" id="editMana" value="${data.mana}" min="0" max="${data.manaMax}">
        </div>
        <div class="attribute-box">
          <label>Mana Máxima</label>
          <input type="number" id="editManaMax" value="${data.manaMax}" min="1">
        </div>
        <div class="attribute-box">
          <label>Sanidade Atual</label>
          <input type="number" id="editSanidade" value="${data.sanidade}" min="0" max="${data.sanidadeMax}">
        </div>
        <div class="attribute-box">
          <label>Sanidade Máxima</label>
          <input type="number" id="editSanidadeMax" value="${data.sanidadeMax}" min="1">
        </div>
        <div class="attribute-box">
          <label>Nível</label>
          <input type="number" id="editNivel" value="${data.nivel}" min="1">
        </div>
      </div>
    </div>
    
    <div class="sheet-section">
      <h2>História</h2>
      <div class="form-group">
        <textarea id="editHistory" style="width: 100%;">${data.history || ''}</textarea>
      </div>
    </div>
    
    <button id="btnSaveSheet" class="btn-save">💾 Salvar Alterações</button>
  `;
  
  $('btnSaveSheet').addEventListener('click', () => saveCharacterSheet(id));
}

async function saveCharacterSheet(id) {
  if (!currentUser) return;
  
  const updatedData = {
    attributes: {
      corpo: parseInt($('editCorpo').value),
      mente: parseInt($('editMente').value),
      destreza: parseInt($('editDestreza').value),
      carisma: parseInt($('editCarisma').value),
      essencia: parseInt($('editEssencia').value)
    },
    pv: parseInt($('editPV').value),
    pvMax: parseInt($('editPVMax').value),
    mana: parseInt($('editMana').value),
    manaMax: parseInt($('editManaMax').value),
    sanidade: parseInt($('editSanidade').value),
    sanidadeMax: parseInt($('editSanidadeMax').value),
    nivel: parseInt($('editNivel').value),
    history: $('editHistory').value.trim()
  };
  
  try {
    await updateDoc(doc(db, "characters", id), updatedData);
    showToast("✓ Personagem atualizado!");
    await loadCharacters();
  } catch (err) {
    showToast("❌ Erro ao salvar");
    console.error(err);
  }
}

$('btnBackToList').addEventListener('click', () => {
  $('sectionSheet').classList.remove('active');
  $('sectionCreate').classList.add('active');
  currentCharacterId = null;
});

document.querySelectorAll('.rpg-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.rpg-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    loadCharacters();
  });
});
</script>

</body>
</html>
