<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sui Hub</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f0f0f;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    header {
        width: 100%;
        max-width: 900px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        box-sizing: border-box;
    }

    .btn {
        padding: 10px 14px;
        background: #202020;
        border-radius: 7px;
        cursor: pointer;
        transition: 0.2s;
        border: 1px solid #333;
        display: inline-block;
    }

    .btn:hover {
        background: #333;
    }

    #profileBox {
        border: 1px solid #333;
        padding: 15px;
        border-radius: 10px;
        background: #151515;
        margin-top: 10px;
        width: 100%;
        max-width: 900px;
    }

    #commentBox {
        width: 100%;
        max-width: 900px;
        margin-top: 20px;
        padding: 15px;
        background: #151515;
        border-radius: 10px;
        border: 1px solid #333;
    }

    textarea {
        width: 100%;
        background: #111;
        color: white;
        border: 1px solid #333;
        border-radius: 8px;
        resize: none;
        padding: 10px;
        height: 80px;
    }

    #commentList {
        margin-top: 20px;
    }

    .comment {
        padding: 10px;
        border-bottom: 1px solid #333;
    }

    .comment small {
        opacity: 0.7;
    }

</style>
</head>
<body>

<header>
    <h2>Sui Hub</h2>
    <div id="authButtons">
        <div class="btn" id="loginBtn">Entrar com Google</div>
    </div>
</header>

<div id="profileBox" style="display:none;">
    <h3>Perfil</h3>
    <p id="userName"></p>
    <img id="userImg" width="60" style="border-radius:50%;">
    <div class="btn" id="logoutBtn">Sair</div>
</div>

<!-- ✅ COMENTÁRIOS -->
<div id="commentBox">
    <h3>Comentários</h3>

    <div id="commentWrite" style="display:none;">
        <textarea id="commentText" placeholder="Escreva algo..."></textarea>
        <br><br>
        <div class="btn" id="sendComment">Enviar</div>
    </div>

    <div id="commentList"></div>
</div>

<!-- ✅ Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

import { getFirestore, collection, addDoc, query, orderBy, onSnapshot }
    from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

// ✅ CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "sui-hub.firebaseapp.com",
  projectId: "sui-hub",
  storageBucket: "sui-hub.firebasestorage.app",
  messagingSenderId: "590135716171",
  appId: "1:590135716171:web:521bbb28c8ec4eae2e60ce",
  measurementId: "G-G9YXZJV7LE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore(app);

// 🔹 DOM
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const profileBox = document.getElementById("profileBox");
const userName = document.getElementById("userName");
const userImg = document.getElementById("userImg");
const commentWrite = document.getElementById("commentWrite");
const sendComment = document.getElementById("sendComment");
const commentText = document.getElementById("commentText");
const commentList = document.getElementById("commentList");

const provider = new GoogleAuthProvider();

// ✅ LOGIN
loginBtn.onclick = async () => {
    try {
        await signInWithPopup(auth, provider);
    } catch(e) {
        alert("Erro ao logar");
    }
};

// ✅ LOGOUT
logoutBtn.onclick = () => signOut(auth);

// ✅ AUTH EVENT
onAuthStateChanged(auth, user => {
    if(user) {
        loginBtn.style.display = "none";
        profileBox.style.display = "block";
        commentWrite.style.display = "block";
        userName.innerText = user.displayName;
        userImg.src = user.photoURL;
    } else {
        loginBtn.style.display = "inline-block";
        profileBox.style.display = "none";
        commentWrite.style.display = "none";
    }
});

// ✅ Enviar comentário
sendComment.onclick = async () => {
    const text = commentText.value.trim();
    if(!text) return;

    await addDoc(collection(db, "comments"), {
        text,
        user: auth.currentUser.displayName,
        time: Date.now()
    });

    commentText.value = "";
};

// ✅ Listar comentários
const q = query(collection(db, "comments"), orderBy("time", "desc"));

onSnapshot(q, (snapshot)=>{
    commentList.innerHTML = "";
    snapshot.forEach(doc => {
        const c = doc.data();
        commentList.innerHTML += `
            <div class="comment">
                <b>${c.user}</b><br>
                ${c.text}<br>
                <small>${new Date(c.time).toLocaleString()}</small>
            </div>
        `;
    });
});
</script>

</body>
</html>
