<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG Character System</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-dark: #0a0a0f;
  --bg-secondary: #13131a;
  --bg-tertiary: #1a1a24;
  --bg-hover: #20202e;
  --text-primary: #ffffff;
  --text-secondary: #a0a0b8;
  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --success: #10b981;
  --border: #2a2a3e;
  --common: #9ca3af;
  --uncommon: #22c55e;
  --rare: #3b82f6;
  --epic: #a855f7;
  --legendary: #f59e0b;
}

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, var(--bg-dark) 0%, #0f0f1a 100%);
  color: var(--text-primary);
  min-height: 100vh;
}

.login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 1rem;
}

.login-box {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2.5rem;
  text-align: center;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.login-logo {
  font-size: 2.5rem;
  font-weight: 800;
  margin-bottom: 0.5rem;
  background: linear-gradient(135deg, #6366f1, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.login-subtitle {
  color: var(--text-secondary);
  margin-bottom: 2rem;
  font-size: 0.95rem;
}

.btn-google {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  width: 100%;
  padding: 1rem;
  background: white;
  color: #1f1f1f;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: transform 0.2s;
}

.btn-google:hover {
  transform: scale(1.02);
}

.app-container {
  display: none;
  flex-direction: column;
  min-height: 100vh;
}

.app-container.active {
  display: flex;
}

.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.logo {
  font-size: 1.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, #6366f1, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.user-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  cursor: pointer;
}

.nav-tabs {
  display: flex;
  gap: 0.5rem;
  padding: 1rem;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}

.nav-tab {
  padding: 0.625rem 1.25rem;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-secondary);
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}

.nav-tab:hover {
  background: var(--bg-hover);
}

.nav-tab.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.content {
  flex: 1;
  padding: 1rem;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}

.page {
  display: none;
}

.page.active {
  display: block;
  animation: fadeIn 0.3s;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.campaign-header {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1rem;
}

.campaign-header h1 {
  font-size: 1.75rem;
  margin-bottom: 0.5rem;
}

.campaign-header p {
  color: var(--text-secondary);
  font-size: 0.9rem;
}

.btn-my-sheet {
  width: 100%;
  padding: 1rem;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  color: white;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 1rem;
  transition: transform 0.2s;
}

.btn-my-sheet:hover {
  transform: scale(1.02);
}

.spin-section {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1rem;
}

.spin-section h2 {
  font-size: 1.25rem;
  margin-bottom: 1rem;
}

.spin-grid {
  display: grid;
  gap: 1rem;
}

.spin-item {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem;
}

.spin-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.75rem;
}

.spin-header h3 {
  font-size: 1rem;
  font-weight: 600;
}

.spin-count {
  display: flex;
  gap: 0.25rem;
}

.spin-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border);
}

.spin-dot.active {
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
}

.spin-result {
  min-height: 50px;
  background: var(--bg-dark);
  border: 2px dashed var(--border);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 0.75rem;
  padding: 0.75rem;
  font-weight: 600;
  font-size: 1.1rem;
  position: relative;
  overflow: hidden;
}

.spin-result.spinning {
  border-style: solid;
  animation: pulse 0.5s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

.spin-result.common { border-color: var(--common); color: var(--common); }
.spin-result.uncommon { border-color: var(--uncommon); color: var(--uncommon); }
.spin-result.rare { border-color: var(--rare); color: var(--rare); }
.spin-result.epic { border-color: var(--epic); color: var(--epic); }
.spin-result.legendary { border-color: var(--legendary); color: var(--legendary); }

.btn-spin {
  width: 100%;
  padding: 0.75rem;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  transition: all 0.2s;
}

.btn-spin:hover:not(:disabled) {
  background: var(--accent-hover);
  transform: translateY(-2px);
}

.btn-spin:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.character-form {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  margin-top: 1rem;
}

.form-group {
  margin-bottom: 1rem;
}

.form-group label {
  display: block;
  font-weight: 600;
  font-size: 0.9rem;
  margin-bottom: 0.5rem;
  color: var(--text-secondary);
}

.form-group input,
.form-group textarea {
  width: 100%;
  padding: 0.75rem;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-family: inherit;
}

.form-group textarea {
  resize: vertical;
  min-height: 80px;
}

.btn-create {
  width: 100%;
  padding: 1rem;
  background: var(--success);
  color: white;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-create:hover {
  background: #059669;
  transform: translateY(-2px);
}

.sheet-view {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
}

.sheet-header {
  text-align: center;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 1.5rem;
}

.sheet-header h1 {
  font-size: 2rem;
  margin-bottom: 0.5rem;
}

.sheet-header .subtitle {
  color: var(--text-secondary);
  font-size: 0.95rem;
}

.sheet-section {
  margin-bottom: 1.5rem;
}

.sheet-section h2 {
  font-size: 1.1rem;
  margin-bottom: 1rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0.75rem;
}

.info-box {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.75rem;
  text-align: center;
}

.info-box label {
  display: block;
  font-size: 0.75rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  margin-bottom: 0.25rem;
}

.info-box .value {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--text-primary);
}

.profile-section {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1rem;
}

.profile-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 1rem;
}

.profile-avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 3px solid var(--accent);
}

.profile-info h2 {
  font-size: 1.25rem;
  margin-bottom: 0.25rem;
}

.profile-info p {
  color: var(--text-secondary);
  font-size: 0.9rem;
}

.code-input-section {
  margin-top: 1rem;
}

.code-input-section h3 {
  font-size: 1rem;
  margin-bottom: 0.75rem;
}

.code-form {
  display: flex;
  gap: 0.5rem;
}

.code-form input {
  flex: 1;
  padding: 0.75rem;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-family: inherit;
}

.btn-code {
  padding: 0.75rem 1.5rem;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}

.btn-logout {
  padding: 0.5rem 1rem;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-weight: 600;
  cursor: pointer;
}

.toast {
  position: fixed;
  bottom: 1rem;
  right: 1rem;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  padding: 1rem 1.5rem;
  border-radius: 12px;
  font-weight: 600;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.3s;
  z-index: 1000;
  max-width: 90%;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.btn-back {
  width: 100%;
  padding: 0.75rem;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 1rem;
}

@media (min-width: 640px) {
  .spin-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 1024px) {
  .content {
    padding: 2rem;
  }
  
  .spin-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">⚔️ RPG System</div>
    <p class="login-subtitle">Crie e gerencie suas fichas de personagem</p>
    <button id="btnLogin" class="btn-google">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Entrar com Google
    </button>
  </div>
</div>

<div id="appContainer" class="app-container">
  <header class="header">
    <div class="logo">⚔️ RPG</div>
    <div class="user-menu">
      <img id="userAvatar" class="user-avatar" src="" alt="">
    </div>
  </header>

  <nav class="nav-tabs">
    <button class="nav-tab active" data-page="campaign">Campanha</button>
    <button class="nav-tab" data-page="profile">Perfil</button>
  </nav>

  <div class="content">
    <div id="pageCampaign" class="page active">
      <div class="campaign-header">
        <h1>⚔️ Ordem Mágica</h1>
        <p>Sistema de criação de personagens</p>
      </div>

      <button id="btnMySheet" class="btn-my-sheet" style="display:none;">📜 Minha Ficha</button>

      <div id="creationArea">
        <div class="spin-section">
          <h2>🎲 Criação de Personagem</h2>
          <div class="spin-grid" id="spinGrid"></div>
        </div>

        <div class="character-form" id="characterForm" style="display:none;">
          <h2 style="margin-bottom:1rem;">Informações do Personagem</h2>
          <div class="form-group">
            <label>Nome *</label>
            <input type="text" id="charName" required>
          </div>
          <div class="form-group">
            <label>Idade</label>
            <input type="number" id="charAge" min="1">
          </div>
          <div class="form-group">
            <label>História</label>
            <textarea id="charHistory"></textarea>
          </div>
          <button id="btnCreateChar" class="btn-create">✓ Criar Personagem</button>
        </div>
      </div>

      <div id="sheetArea" style="display:none;">
        <button id="btnBackToCampaign" class="btn-back">← Voltar para Campanha</button>
        <div class="sheet-view" id="sheetContent"></div>
      </div>
    </div>

    <div id="pageProfile" class="page">
      <div class="profile-section">
        <div class="profile-header">
          <img id="profileAvatar" class="profile-avatar" src="" alt="">
          <div class="profile-info">
            <h2 id="profileName"></h2>
            <p id="profileEmail"></p>
          </div>
        </div>

        <div class="code-input-section">
          <h3>🎁 Resgatar Código</h3>
          <form class="code-form" id="codeForm">
            <input type="text" id="codeInput" placeholder="Digite o código" style="text-transform:lowercase;">
            <button type="submit" class="btn-code">Resgatar</button>
          </form>
        </div>

        <div style="margin-top:2rem;">
          <button id="btnLogout" class="btn-logout" style="width:100%;">Sair</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module" src="app.js"></script>
</body>
</html>
