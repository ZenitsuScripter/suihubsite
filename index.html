<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Blade Ball 2P - Kaiser Impact com Curva Teleguiada</title>
<style>
  * {
    margin:0; padding:0; box-sizing:border-box;
  }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at center, #004466, #001522);
    display: flex;
    justify-content: center;
    align-items: center;
    user-select: none;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #eee;
  }
  canvas {
    display: block;
    background: #003350;
    box-shadow: 0 0 25px #09f;
    border-radius: 12px;
  }
  #scoreboard {
    position: fixed;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    letter-spacing: 1.4px;
    text-shadow: 0 0 8px #09f;
    z-index: 10;
  }
  #instructions {
    position: fixed;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    opacity: 0.7;
    user-select: none;
    max-width: 600px;
    text-align: center;
  }
  #kaiserImpactText {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 56px;
    font-weight: 900;
    color: #00ffff;
    text-shadow:
      0 0 10px #00ffff,
      0 0 20px #00ffff,
      0 0 30px #00ffff,
      0 0 40px #00ffff,
      0 0 50px #00ffff;
    pointer-events: none;
    user-select: none;
    opacity: 0;
    transition: opacity 0.3s ease-in-out;
    z-index: 1000;
  }
</style>
</head>
<body>
<div id="scoreboard">Jogador 1: 0 &nbsp;&nbsp;|&nbsp;&nbsp; Jogador 2: 0</div>
<div id="instructions">
  Jogador 1: W/A/S/D + <b>E</b> (Kaiser Impact) &nbsp;&nbsp;|&nbsp;&nbsp; Jogador 2: ↑/←/↓/→ <br />
  Faça gols no gol adversário!
</div>
<div id="kaiserImpactText">KAISER IMPACT</div>
<canvas id="game"></canvas>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const kaiserTextEl = document.getElementById('kaiserImpactText');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Player 1 - esquerda
  const player1 = {
    x: 100,
    y: canvas.height / 2,
    radius: 50,
    color1: '#00eaff',
    color2: '#004a66',
    speed: 7,
    vx: 0,
    vy: 0,
    up: false,
    down: false,
    left: false,
    right: false,
    score: 0,
  };

  // Player 2 - direita
  const player2 = {
    x: canvas.width - 100,
    y: canvas.height / 2,
    radius: 50,
    color1: '#ff4500',
    color2: '#660200',
    speed: 7,
    vx: 0,
    vy: 0,
    up: false,
    down: false,
    left: false,
    right: false,
    score: 0,
  };

  // Bola com spin para efeito Magnus
  const ball = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radius: 15,
    speedX: 6 * (Math.random() < 0.7 ? 1 : -1),
    speedY: 4 * (Math.random() < 0.7 ? 1 : -1),
    color: '#ffff00',
    trail: [],
    spin: 0,
  };

  const scoreEl = document.getElementById('scoreboard');

  // Estado do Kaiser Impact
  let kaiserActive = false;
  let kaiserTimeout = null;

  // Teclado eventos
  window.addEventListener('keydown', e => {
    switch(e.code) {
      // Player 1
      case 'KeyW': player1.up = true; break;
      case 'KeyS': player1.down = true; break;
      case 'KeyA': player1.left = true; break;
      case 'KeyD': player1.right = true; break;
      case 'KeyE':
        if(!kaiserActive) activateKaiserImpact();
        break;
      // Player 2
      case 'ArrowUp': player2.up = true; break;
      case 'ArrowDown': player2.down = true; break;
      case 'ArrowLeft': player2.left = true; break;
      case 'ArrowRight': player2.right = true; break;
    }
  });
  window.addEventListener('keyup', e => {
    switch(e.code) {
      // Player 1
      case 'KeyW': player1.up = false; break;
      case 'KeyS': player1.down = false; break;
      case 'KeyA': player1.left = false; break;
      case 'KeyD': player1.right = false; break;
      // Player 2
      case 'ArrowUp': player2.up = false; break;
      case 'ArrowDown': player2.down = false; break;
      case 'ArrowLeft': player2.left = false; break;
      case 'ArrowRight': player2.right = false; break;
    }
  });

  // Ativa o Kaiser Impact com spin para efeito Magnus + curva teleguiada
  function activateKaiserImpact() {
    kaiserActive = true;
    // Direcionar a bola para o gol do Player 2 com velocidade forte
    const goalCenterY = canvas.height / 2;
    const dx = canvas.width - ball.x;
    const dy = goalCenterY - ball.y;
    const angle = Math.atan2(dy, dx);

    const power = 20; // força do chute

    ball.speedX = Math.cos(angle) * power;
    ball.speedY = Math.sin(angle) * power;

    // Define spin para o efeito Magnus: spin positivo para curva para cima/direita
    ball.spin = 1.5;

    // Exibe o texto KAISER IMPACT
    kaiserTextEl.style.opacity = '1';

    if (kaiserTimeout) clearTimeout(kaiserTimeout);
    kaiserTimeout = setTimeout(() => {
      kaiserTextEl.style.opacity = '0';
      kaiserActive = false;
      ball.spin = 0; // para o efeito Magnus após fim do Kaiser
    }, 1500);
  }

  // Função para mover players
  function movePlayer(p) {
    p.vx = 0; p.vy = 0;
    if(p.up) p.vy = -p.speed;
    if(p.down) p.vy = p.speed;
    if(p.left) p.vx = -p.speed;
    if(p.right) p.vx = p.speed;

    // Atualiza posição
    p.x += p.vx;
    p.y += p.vy;

    // Limites do campo (dentro da tela)
    p.x = Math.min(Math.max(p.radius, p.x), canvas.width - p.radius);
    p.y = Math.min(Math.max(p.radius, p.y), canvas.height - p.radius);
  }

  // Desenha player
  function drawPlayer(p) {
    const grad = ctx.createRadialGradient(p.x, p.y, p.radius*0.3, p.x, p.y, p.radius);
    grad.addColorStop(0, p.color1);
    grad.addColorStop(1, p.color2);

    ctx.fillStyle = grad;
    ctx.shadowColor = p.color1;
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Desenha bola com trail (rastro azul no Kaiser)
  function drawBall() {
    ball.trail.push({x: ball.x, y: ball.y, alpha: 0.5});
    if(ball.trail.length > 20) ball.trail.shift();

    ball.trail.forEach((t, i) => {
      ctx.beginPath();
      if(kaiserActive) {
        ctx.fillStyle = `rgba(0,180,255,${t.alpha * (i / ball.trail.length)})`; // rastro azul
        ctx.shadowColor = 'rgba(0,180,255,0.8)';
      } else {
        ctx.fillStyle = `rgba(255,255,0,${t.alpha * (i / ball.trail.length)})`; // amarelo normal
        ctx.shadowColor = 'rgba(255,255,0,0.8)';
      }
      ctx.shadowBlur = 10;
      ctx.arc(t.x, t.y, ball.radius * 0.9, 0, Math.PI * 2);
      ctx.fill();
    });

    ctx.beginPath();
    const grad = ctx.createRadialGradient(ball.x - ball.radius/3, ball.y - ball.radius/3, ball.radius*0.1, ball.x, ball.y, ball.radius);
    if(kaiserActive) {
      grad.addColorStop(0, '#00b4ff');
      grad.addColorStop(1, '#005580');
    } else {
      grad.addColorStop(0, '#ffff66');
      grad.addColorStop(1, '#999900');
    }
    ctx.fillStyle = grad;
    ctx.shadowColor = kaiserActive ? '#00b4ff' : '#ffff00';
    ctx.shadowBlur = 15;
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Atualiza bola, trata colisões e gols
  function updateBall() {
    if(kaiserActive && ball.spin !== 0) {
      const speed = Math.sqrt(ball.speedX*ball.speedX + ball.speedY*ball.speedY);
      if(speed > 0.1) {
        const vxNorm = ball.speedX / speed;
        const vyNorm = ball.speedY / speed;

        // Curvatura Magnus
        const magnusForceX = -vyNorm * ball.spin * 0.5;
        const magnusForceY = vxNorm * ball.spin * 0.5;

        ball.speedX += magnusForceX;
        ball.speedY += magnusForceY;

        // Força teleguiada para o gol vertical (y)
        const goalCenterY = canvas.height / 2;
        const diffY = goalCenterY - ball.y;
        const steerStrength = 0.6; // ajusta o quanto a bola "se guia"
        ball.speedY += diffY * 0.01 * steerStrength;
      }
    }

    ball.x += ball.speedX;
    ball.y += ball.speedY;

    if(ball.y - ball.radius < 0) {
      ball.y = ball.radius;
      ball.speedY *= -1;
    }
    if(ball.y + ball.radius > canvas.height) {
      ball.y = canvas.height - ball.radius;
      ball.speedY *= -1;
    }

    [player1, player2].forEach(p => {
      const dx = ball.x - p.x;
      const dy = ball.y - p.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < ball.radius + p.radius) {
        if(kaiserActive) {
          // permite desviar mesmo com Kaiser Impact
          // cancela Kaiser Impact no impacto
          kaiserActive = false;
          ball.spin = 0;
          kaiserTextEl.style.opacity = '0';
        }

        const angle = Math.atan2(dy, dx);
        const speed = Math.sqrt(ball.speedX*ball.speedX + ball.speedY*ball.speedY) + 0.7;
        ball.speedX = Math.cos(angle) * speed;
        ball.speedY = Math.sin(angle) * speed;

        ball.x = p.x + Math.cos(angle) * (ball.radius + p.radius + 1);
        ball.y = p.y + Math.sin(angle) * (ball.radius + p.radius + 1);

        const maxSpeed = 16;
        if(Math.abs(ball.speedX) > maxSpeed) ball.speedX = maxSpeed * Math.sign(ball.speedX);
        if(Math.abs(ball.speedY) > maxSpeed) ball.speedY = maxSpeed * Math.sign(ball.speedY);
      }
    });

    // Gol e rebote
    if(ball.x - ball.radius < 0) {
      // Gol Player 2
      if(ball.y > canvas.height * 0.3 && ball.y < canvas.height * 0.7) {
        player2.score++;
        resetPositions();
        updateScore();
      } else {
        ball.x = ball.radius;
        ball.speedX *= -1;
      }
    }

    if(ball.x + ball.radius > canvas.width) {
      // Gol Player 1
      if(ball.y > canvas.height * 0.3 && ball.y < canvas.height * 0.7) {
        player1.score++;
        resetPositions();
        updateScore();
      } else {
        ball.x = canvas.width - ball.radius;
        ball.speedX *= -1;
      }
    }
  }

  function resetPositions() {
    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
    const direction = (player1.score > player2.score) ? -1 : 1;
    ball.speedX = 6 * direction;
    ball.speedY = (Math.random() * 6 - 3);
    player1.x = 100;
    player1.y = canvas.height / 2;
    player2.x = canvas.width - 100;
    player2.y = canvas.height / 2;

    kaiserActive = false;
    ball.spin = 0;
    kaiserTextEl.style.opacity = '0';
    if (kaiserTimeout) {
      clearTimeout(kaiserTimeout);
      kaiserTimeout = null;
    }
  }

  function updateScore() {
    scoreEl.textContent = `Jogador 1: ${player1.score}  |  Jogador 2: ${player2.score}`;
  }

  function drawField() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#0a3d0a');
    grad.addColorStop(1, '#004d00');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(0, canvas.height * 0.3, 50, canvas.height * 0.4);
    ctx.fillRect(canvas.width - 50, canvas.height * 0.3, 50, canvas.height * 0.4);

    ctx.strokeStyle = 'white';
    ctx.lineWidth = 4;
    ctx.setLineDash([15, 15]);
    ctx.beginPath();
    ctx.moveTo(canvas.width / 2, 0);
    ctx.lineTo(canvas.width / 2, canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.beginPath();
    ctx.arc(canvas.width / 2, canvas.height / 2, 90, 0, Math.PI * 2);
    ctx.stroke();

    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    ctx.strokeRect(0, canvas.height * 0.3, 50, canvas.height * 0.4);
    ctx.strokeRect(canvas.width - 50, canvas.height * 0.3, 50, canvas.height * 0.4);
  }

  function loop() {
    drawField();
    movePlayer(player1);
    movePlayer(player2);
    updateBall();
    drawPlayer(player1);
    drawPlayer(player2);
    drawBall();
    requestAnimationFrame(loop);
  }

  updateScore();
  resetPositions();
  loop();

})();
</script>
</body>
</html>
