<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG Campaign Builder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-dark: #0a0a0f;
  --bg-secondary: #13131a;
  --bg-tertiary: #1a1a24;
  --bg-hover: #20202e;
  --text-primary: #ffffff;
  --text-secondary: #a0a0b8;
  --accent: #d97706;
  --accent-hover: #b45309;
  --success: #10b981;
  --border: #2a2a3e;
  --common: #9ca3af;
  --uncommon: #22c55e;
  --rare: #3b82f6;
  --epic: #a855f7;
  --legendary: #f59e0b;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  background-image: 
    radial-gradient(at 20% 80%, rgba(217, 119, 6, 0.1) 0px, transparent 50%),
    radial-gradient(at 80% 20%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
}

h1, h2, h3, .logo, .campaign-title {
  font-family: 'Cinzel', serif;
}

.login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 1rem;
}

.login-box {
  background: var(--bg-secondary);
  border: 2px solid var(--accent);
  border-radius: 20px;
  padding: 3rem 2.5rem;
  text-align: center;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(217, 119, 6, 0.3);
}

.login-logo {
  font-size: 3rem;
  font-weight: 800;
  margin-bottom: 0.5rem;
  color: var(--accent);
  text-shadow: 0 0 20px rgba(217, 119, 6, 0.5);
}

.login-subtitle {
  color: var(--text-secondary);
  margin-bottom: 2rem;
  font-size: 0.95rem;
}

.btn-google {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  width: 100%;
  padding: 1rem;
  background: white;
  color: #1f1f1f;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: transform 0.2s;
}

.btn-google:hover {
  transform: scale(1.02);
}

.app-container {
  display: none;
  flex-direction: column;
  min-height: 100vh;
}

.app-container.active {
  display: flex;
}

.header {
  background: var(--bg-secondary);
  border-bottom: 2px solid var(--accent);
  padding: 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.logo {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--accent);
  text-shadow: 0 0 10px rgba(217, 119, 6, 0.5);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.user-menu {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.user-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  cursor: pointer;
  box-shadow: 0 0 10px rgba(217, 119, 6, 0.3);
}

.nav-tabs {
  display: flex;
  gap: 0.5rem;
  padding: 1rem;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}

.nav-tab {
  padding: 0.625rem 1.25rem;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-secondary);
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}

.nav-tab:hover {
  background: var(--bg-hover);
  border-color: var(--accent);
}

.nav-tab.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.content {
  flex: 1;
  padding: 1rem;
  max-width: 1400px;
  margin: 0 auto;
  width: 100%;
}

.page {
  display: none;
}

.page.active {
  display: block;
  animation: fadeIn 0.3s;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.campaigns-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1rem;
  margin-bottom: 2rem;
}

.campaign-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.campaign-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--accent), var(--epic));
}

.campaign-card:hover {
  transform: translateY(-4px);
  border-color: var(--accent);
  box-shadow: 0 10px 30px rgba(217, 119, 6, 0.2);
}

.campaign-title {
  font-size: 1.5rem;
  margin-bottom: 0.5rem;
  color: var(--accent);
}

.campaign-author {
  color: var(--text-secondary);
  font-size: 0.875rem;
  margin-bottom: 1rem;
}

.campaign-stats {
  display: flex;
  gap: 1rem;
  font-size: 0.875rem;
  color: var(--text-secondary);
}

.btn-create-campaign {
  width: 100%;
  padding: 1rem;
  background: linear-gradient(135deg, var(--accent), #ea580c);
  color: white;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 2rem;
}

.btn-create-campaign:hover {
  transform: scale(1.02);
  box-shadow: 0 10px 30px rgba(217, 119, 6, 0.3);
}

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(4px);
  z-index: 1000;
  padding: 1rem;
  overflow-y: auto;
}

.modal.show {
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: var(--bg-secondary);
  border: 2px solid var(--accent);
  border-radius: 20px;
  padding: 2rem;
  max-width: 800px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
}

.modal-header h2 {
  font-size: 1.75rem;
  color: var(--accent);
}

.btn-close {
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-size: 1.5rem;
  cursor: pointer;
  padding: 0.5rem;
}

.form-group {
  margin-bottom: 1.5rem;
}

.form-group label {
  display: block;
  font-weight: 600;
  font-size: 0.9rem;
  margin-bottom: 0.5rem;
  color: var(--text-secondary);
}

.form-group input,
.form-group textarea {
  width: 100%;
  padding: 0.75rem;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-family: inherit;
}

.form-group textarea {
  resize: vertical;
  min-height: 80px;
}

.categories-builder {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem;
  margin-bottom: 1rem;
}

.category-item {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem;
  margin-bottom: 1rem;
}

.category-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.75rem;
}

.btn-remove {
  background: #ef4444;
  color: white;
  border: none;
  padding: 0.5rem 1rem;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.875rem;
}

.options-list {
  margin-top: 0.75rem;
}

.option-item {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
  align-items: center;
}

.option-item input {
  padding: 0.5rem;
}

.option-item select {
  padding: 0.5rem;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
}

.rarity-badge {
  padding: 0.25rem 0.5rem;
  border-radius: 6px;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
}

.rarity-badge.common { background: var(--common); color: white; }
.rarity-badge.uncommon { background: var(--uncommon); color: white; }
.rarity-badge.rare { background: var(--rare); color: white; }
.rarity-badge.epic { background: var(--epic); color: white; }
.rarity-badge.legendary { background: var(--legendary); color: white; }

.btn-add {
  padding: 0.5rem 1rem;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.875rem;
  font-weight: 600;
}

.btn-primary {
  width: 100%;
  padding: 1rem;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary:hover {
  background: var(--accent-hover);
}

.spin-section {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1rem;
}

.spin-grid {
  display: grid;
  gap: 1rem;
}

.spin-item {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem;
}

.spin-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.75rem;
}

.spin-count {
  display: flex;
  gap: 0.25rem;
}

.spin-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border);
}

.spin-dot.active {
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
  animation: glow 1s infinite;
}

@keyframes glow {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.spin-result {
  min-height: 60px;
  background: var(--bg-dark);
  border: 2px dashed var(--border);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 0.75rem;
  padding: 0.75rem;
  font-weight: 700;
  font-size: 1.1rem;
  position: relative;
  overflow: hidden;
  font-family: 'Cinzel', serif;
}

.spin-result.spinning {
  border-style: solid;
  animation: spinPulse 0.3s infinite;
}

@keyframes spinPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.spin-result.common { border-color: var(--common); color: var(--common); }
.spin-result.uncommon { border-color: var(--uncommon); color: var(--uncommon); }
.spin-result.rare { border-color: var(--rare); color: var(--rare); }
.spin-result.epic { border-color: var(--epic); color: var(--epic); }
.spin-result.legendary { 
  border-color: var(--legendary); 
  color: var(--legendary);
  box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
}

.btn-spin {
  width: 100%;
  padding: 0.875rem;
  background: linear-gradient(135deg, var(--accent), #ea580c);
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  transition: all 0.2s;
  font-family: 'Cinzel', serif;
}

.btn-spin:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(217, 119, 6, 0.4);
}

.btn-spin:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.percentage-display {
  text-align: right;
  color: var(--accent);
  font-weight: 600;
  margin-top: 0.5rem;
  font-size: 0.875rem;
}

.toast {
  position: fixed;
  bottom: 1rem;
  right: 1rem;
  background: var(--bg-secondary);
  border: 1px solid var(--accent);
  padding: 1rem 1.5rem;
  border-radius: 12px;
  font-weight: 600;
  box-shadow: 0 10px 40px rgba(217, 119, 6, 0.5);
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.3s;
  z-index: 2000;
  max-width: 90%;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

@media (min-width: 640px) {
  .spin-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 1024px) {
  .content {
    padding: 2rem;
  }
  
  .spin-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">⚔️ REALM</div>
    <p class="login-subtitle">Crie campanhas épicas de RPG</p>
    <button id="btnLogin" class="btn-google">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Entrar com Google
    </button>
  </div>
</div>

<div id="appContainer" class="app-container">
  <header class="header">
    <div class="logo">⚔️ REALM</div>
    <div class="user-menu">
      <img id="userAvatar" class="user-avatar" src="" alt="">
    </div>
  </header>

  <nav class="nav-tabs">
    <button class="nav-tab active" data-page="campaigns">Campanhas</button>
    <button class="nav-tab" data-page="my-campaigns" id="navMyCampaigns" style="display:none;">Minhas Campanhas</button>
  </nav>

  <div class="content">
    <div id="pageCampaigns" class="page active">
      <button id="btnCreateCampaign" class="btn-create-campaign" style="display:none;">
        ✨ Criar Nova Campanha
      </button>
      
      <div class="campaigns-grid" id="campaignsGrid"></div>
    </div>

    <div id="pageMyCampaigns" class="page">
      <h2 style="margin-bottom:1rem; font-size:1.75rem;">Minhas Campanhas</h2>
      <div class="campaigns-grid" id="myCampaignsGrid"></div>
    </div>
  </div>
</div>

<div id="modalCreateCampaign" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>✨ Criar Campanha</h2>
      <button class="btn-close" id="btnCloseModal">×</button>
    </div>
    
    <div class="form-group">
      <label>Título da Campanha *</label>
      <input type="text" id="campaignTitle" placeholder="Ex: Reino das Sombras">
    </div>
    
    <div class="form-group">
      <label>Descrição</label>
      <textarea id="campaignDesc" placeholder="Descreva sua campanha..."></textarea>
    </div>
    
    <h3 style="margin-bottom:1rem;">Categorias</h3>
    <div id="categoriesContainer"></div>
    
    <button class="btn-add" id="btnAddCategory">+ Adicionar Categoria</button>
    
    <button class="btn-primary" id="btnSaveCampaign" style="margin-top:2rem;">Criar Campanha</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module" src="app.js"></script>
</body>
</html>
