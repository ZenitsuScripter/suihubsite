<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sui Hub Site</title>
<style>
  :root{
    --bg:#071028; --card:#0b1220; --muted:#9aa4b2; --accent:#7c3aed; --glass:rgba(255,255,255,0.03);
    --glass2:rgba(255,255,255,0.02); --text:#e6eef6;
  }
  body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  body.light{--bg:#f6f8fb;--card:#ffffff;--muted:#6b7280;--text:#0b1220}
  .wrap{max-width:1100px;margin:28px auto;padding:18px;position:relative;}
  .card{background:linear-gradient(180deg,var(--glass),var(--glass2));border-radius:12px;padding:16px;box-shadow:0 8px 30px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.03)}
  .btn{appearance:none;border:0;padding:8px 12px;border-radius:10px;cursor:pointer;font-weight:600}
  .btn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted)}
  .btn-primary{background:linear-gradient(90deg,var(--accent),#5b21b6);color:#fff}
  .hidden{display:none}
  pre{background:#020617;padding:14px;border-radius:8px;color:var(--text);overflow:auto;font-family:ui-monospace,Consolas,monospace}
  
  /* avatar canto superior */
  #avatarBtn{position:fixed;top:18px;right:18px;width:48px;height:48px;border-radius:50%;overflow:hidden;display:grid;place-items:center;cursor:pointer;border:2px solid rgba(124,58,237,0.35);z-index:1000}
  #avatarBtn img{width:100%;height:100%;object-fit:cover;}

  /* drawer lateral */
  .drawer{position:fixed;top:0;right:-360px;width:360px;height:100%;background:var(--card);box-shadow:-10px 0 50px rgba(0,0,0,0.6);transition:right .28s;z-index:999;display:flex;flex-direction:column;gap:12px;padding:18px;}
  .drawer.open{right:0}
  .drawer .close{align-self:flex-end;background:transparent;border:0;color:var(--muted);cursor:pointer}
  .pf-row{display:flex;flex-direction:column;align-items:center;gap:8px}
  .pf-row img{width:96px;height:96px;border-radius:50%;object-fit:cover;}
  .drawer .btn-drawer{width:100%;margin-top:8px;}
  
  /* fullscreen edit */
  .editCover{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:10000}
  .editCard{width:100%;max-width:500px;background:var(--card);padding:24px;border-radius:12px;display:flex;flex-direction:column;gap:12px}
  .editCard input, .editCard textarea{width:100%;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--text);}
</style>
</head>
<body>

<div class="wrap">
  <!-- LOGIN -->
  <div id="loginTab" class="card" style="text-align:center">
    <h2>Bem-vindo ao Sui Hub</h2>
    <p class="small">Faça login para acessar o script loader — Demonfall</p>
    <button id="loginBtn" class="btn btn-primary">Login Google</button>
  </div>

  <!-- SCRIPT -->
  <div id="scriptTab" class="hidden card">
    <h2>Sui Hub — Demonfall</h2>
    <pre id="codeArea" style="margin-top:12px;">loadstring(game:HttpGet("https://haxhell.com/raw/56-demonfall-sui-hub"))()</pre>
    <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
      <button id="copyBtn" class="btn btn-primary">Copiar</button>
      <button id="downloadBtn" class="btn btn-ghost">Baixar</button>
      <button id="viewBtn" class="btn btn-ghost">Visualizar</button>
      <span id="statusMsg" class="small"></span>
    </div>
  </div>
</div>

<!-- Avatar fixo -->
<div id="avatarBtn" class="hidden"><img id="avatarImg" src="" alt="avatar"></div>

<!-- Drawer lateral -->
<div id="drawer" class="drawer">
  <button id="closeDrawer" class="close">✕</button>
  <div class="pf-row">
    <img id="drawerPfp" src="" alt="avatar">
    <div id="drawerName" style="font-weight:700;font-size:18px">—</div>
    <div id="drawerEmail" class="small muted">—</div>
  </div>
  <button id="editProfileBtn" class="btn btn-primary btn-drawer">Editar Perfil</button>
  <button id="themeToggleBtn" class="btn btn-ghost btn-drawer">Tema Claro/Escuro</button>
  <button id="logoutBtn" class="btn btn-ghost btn-drawer">Desconectar</button>
</div>

<!-- Fullscreen Edit -->
<div id="editCover" class="editCover">
  <div class="editCard">
    <h2>Editar Perfil</h2>
    <label>Nome</label>
    <input id="fullName" type="text" placeholder="Seu nome público">
    <label>Bio</label>
    <textarea id="fullBio" rows="4" placeholder="Sua biografia"></textarea>
    <label>Foto (max 500KB)</label>
    <input id="fullPhoto" type="file" accept="image/*">
    <div style="display:flex;gap:8px;margin-top:12px">
      <button id="fullSave" class="btn btn-primary">Salvar</button>
      <button id="fullBack" class="btn btn-ghost">Voltar</button>
    </div>
    <div id="fullMsg" class="small" style="margin-top:8px"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, query, collection, where, getDocs } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyBG3D3ieH0f-3608DcWnIIfQS_n5tP7EHE", authDomain:"sui-hub.firebaseapp.com", projectId:"sui-hub" };
const OWNER_UID="gV06HRh6saXgXkPWG2FME2Or1";
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const loginBtn = document.getElementById("loginBtn");
const loginTab = document.getElementById("loginTab");
const scriptTab = document.getElementById("scriptTab");
const avatarBtn = document.getElementById("avatarBtn");
const avatarImg = document.getElementById("avatarImg");
const drawer = document.getElementById("drawer");
const closeDrawer = document.getElementById("closeDrawer");
const drawerPfp = document.getElementById("drawerPfp");
const drawerName = document.getElementById("drawerName");
const drawerEmail = document.getElementById("drawerEmail");
const editProfileBtn = document.getElementById("editProfileBtn");
const themeToggleBtn = document.getElementById("themeToggleBtn");
const logoutBtn = document.getElementById("logoutBtn");

const editCover = document.getElementById("editCover");
const fullName = document.getElementById("fullName");
const fullBio = document.getElementById("fullBio");
const fullPhoto = document.getElementById("fullPhoto");
const fullSave = document.getElementById("fullSave");
const fullBack = document.getElementById("fullBack");
const fullMsg = document.getElementById("fullMsg");

const codeArea = document.getElementById("codeArea");
const copyBtn = document.getElementById("copyBtn");
const downloadBtn = document.getElementById("downloadBtn");
const viewBtn = document.getElementById("viewBtn");
const statusMsg = document.getElementById("statusMsg");

// Script actions
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
copyBtn.addEventListener("click", ()=> { navigator.clipboard.writeText(codeArea.textContent).then(()=>{ statusMsg.textContent="Copiado!"; setTimeout(()=>statusMsg.textContent="",1200); }); });
downloadBtn.addEventListener("click", ()=> { const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([codeArea.textContent],{type:"text/plain"})); a.download="sui-hub-demonfall.lua"; document.body.appendChild(a); a.click(); a.remove(); });
viewBtn.addEventListener("click", ()=> { const w=window.open(); w.document.write("<pre style='white-space:pre-wrap'>"+escapeHtml(codeArea.textContent)+"</pre>"); w.document.close(); });

// Theme toggle
themeToggleBtn.addEventListener("click", ()=>{document.body.classList.toggle("light");});

// Avatar / Drawer
avatarBtn.addEventListener("click", ()=> drawer.classList.toggle("open"));
closeDrawer.addEventListener("click", ()=> drawer.classList.remove("open"));

// Login
loginBtn.onclick = ()=> signInWithPopup(auth, provider).catch(e=>alert("Erro login: "+e.message));
logoutBtn.onclick = ()=> signOut(auth);

// Edit profile drawer
editProfileBtn.addEventListener("click", ()=>{
  drawer.classList.remove("open");
  editCover.style.display="flex";
});

// Fullscreen edit
fullBack.addEventListener("click", ()=>{ editCover.style.display="none"; fullMsg.textContent=""; fullPhoto.value=""; });

async function readFileAsDataURL(file){
  return new Promise((res,rej)=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.onerror=rej; fr.readAsDataURL(file); });
}

fullSave.addEventListener("click", async ()=>{
  fullMsg.textContent="Salvando...";
  const file = fullPhoto.files[0];
  if(file && file.size>500*1024){ fullMsg.textContent="Foto muito grande"; return; }
  if(!currentUser){ fullMsg.textContent="Faça login"; return; }
  const newName = fullName.value.trim();
  const newBio = fullBio.value.trim();
  if(!newName){ fullMsg.textContent="Nome obrigatório"; return; }

  // Check unique name
  const q = query(collection(db,"users"), where("name","==",newName));
  const qSnap = await getDocs(q);
  let conflict=false;
  qSnap.forEach(d=>{ if(d.id!==currentUser.uid) conflict=true; });
  if(conflict){ fullMsg.textContent="Nome já existe"; return; }

  let photoData=null;
  if(file) photoData = await readFileAsDataURL(file);

  const uRef = doc(db,"users",currentUser.uid);
  const payload={name:newName,bio:newBio};
  if(photoData) payload.photo=photoData;
  await setDoc(uRef,payload,{merge:true});
  await loadUserProfile(currentUser);
  fullMsg.textContent="Salvo!";
  setTimeout(()=>{ editCover.style.display="none"; fullMsg.textContent=""; fullPhoto.value=""; }, 800);
});

let currentUser=null;
onAuthStateChanged(auth, async user=>{
  currentUser = user;
  if(user){
    loginTab.classList.add("hidden");
    scriptTab.classList.remove("hidden");
    avatarBtn.classList.remove("hidden");
    await loadUserProfile(user);
  } else {
    loginTab.classList.remove("hidden");
    scriptTab.classList.add("hidden");
    avatarBtn.classList.add("hidden");
    drawer.classList.remove("open");
  }
});

async function loadUserProfile(user){
  if(!user) return;
  const ref=doc(db,"users",user.uid);
  const snap = await getDoc(ref);
  let data;
  if(snap.exists()) data=snap.data();
  else { data={name:user.displayName||"",bio:"",photo:user.photoURL||"",created:user.metadata.creationTime||new Date().toISOString()}; await setDoc(ref,data,{merge:true}); }
  drawerPfp.src=data.photo||user.photoURL;
  drawerName.textContent=data.name||user.displayName;
  drawerEmail.textContent=user.email||"—";
  avatarImg.src=data.photo||user.photoURL;
  fullName.value = data.name||user.displayName;
  fullBio.value = data.bio||"";
}
</script>
</body>
</html>
