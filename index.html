<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuiHub - Assistir Juntos</title>
  <script src="https://js.pusher.com/8.4.0-rc2/pusher.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #141414;
      color: #ffffff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      overflow-x: hidden;
    }
    header {
      background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
      padding: 25px 60px;
      position: fixed;
      width: 100%;
      z-index: 100;
      display: flex;
      align-items: center;
    }
    .logo {
      font-size: 32px;
      font-weight: bold;
      color: #e50914;
    }
    .main {
      padding-top: 120px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #b3b3b3;
      font-size: 1.4rem;
      margin-bottom: 50px;
    }
    .mode-selector {
      display: flex;
      gap: 25px;
      margin-bottom: 50px;
    }
    .mode-btn {
      padding: 16px 40px;
      font-size: 1.15rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }
    .host-btn {
      background: #e50914;
      color: white;
    }
    .host-btn:hover { background: #f40612; }
    .viewer-btn {
      background: #333333;
      color: white;
    }
    .viewer-btn:hover { background: #4d4d4d; }

    .player-container {
      width: 100%;
      max-width: 1150px;
      position: relative;
    }
    video {
      width: 100%;
      border-radius: 10px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.85);
    }
    .status-bar {
      margin-top: 30px;
      padding: 14px 40px;
      border-radius: 6px;
      font-size: 1.2rem;
      min-height: 58px;
    }
    .host-mode { background: rgba(229, 9, 20, 0.25); color: #ff4d4d; }
    .viewer-mode { background: rgba(255,255,255,0.08); color: #b3b3b3; }

    .info {
      margin-top: 60px;
      color: #666;
      font-size: 1.05rem;
      max-width: 620px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">SuiHub</div>
  </header>

  <div class="main">
    <h1>Assistindo Juntos</h1>
    <p class="subtitle">Episódio 01</p>

    <div class="mode-selector">
      <button onclick="becomeHost()" class="mode-btn host-btn">👑 Sou o Host</button>
      <button onclick="becomeViewer()" class="mode-btn viewer-btn">👀 Só Assistir</button>
    </div>

    <div class="player-container">
      <video id="videoPlayer" controls>
        <source src="https://x5sftp10thclopog.public.blob.vercel-storage.com/01.mp4" type="video/mp4">
      </video>
    </div>

    <div class="status-bar" id="status">Escolha um modo para começar</div>

    <div class="info">
      O Host controla play, pause e avanço • O Viewer acompanha automaticamente
    </div>
  </div>

  <script>
    const PUSHER_APP_KEY = "aa9a7a98dfdf02db42c8";
    const PUSHER_CLUSTER = "sa1";
    const CHANNEL_NAME = "serie-host-control";

    let pusher, channel;
    let isHost = false;
    let video = document.getElementById('videoPlayer');
    let lastSentTime = 0;

    function initPusher() {
      if (pusher) return;

      pusher = new Pusher(PUSHER_APP_KEY, {
        cluster: PUSHER_CLUSTER,
        forceTLS: true
      });

      channel = pusher.subscribe(CHANNEL_NAME);

      // Recebe comandos do Host
      channel.bind('client-video-command', function(data) {
        if (isHost) return;

        if (data.action === 'play') {
          video.play().catch(() => {});
        } else if (data.action === 'pause') {
          video.pause();
        } else if (data.action === 'seek') {
          video.currentTime = data.currentTime || 0;
        }
      });
    }

    function becomeHost() {
      isHost = true;
      document.getElementById('status').innerHTML = '👑 Modo Host ativado • Você está controlando';
      document.getElementById('status').className = 'status-bar host-mode';
      video.controls = true;

      initPusher();

      video.addEventListener('play', sendCommand);
      video.addEventListener('pause', sendCommand);
      video.addEventListener('seeked', sendCommand);
    }

    function becomeViewer() {
      isHost = false;
      document.getElementById('status').innerHTML = '👀 Modo Viewer • Aguardando o Host';
      document.getElementById('status').className = 'status-bar viewer-mode';
      video.controls = false;

      initPusher();
    }

    function sendCommand() {
      if (!isHost || !channel) return;
      if (Date.now() - lastSentTime < 250) return;
      lastSentTime = Date.now();

      const action = video.paused ? 'pause' : 'play';

      channel.trigger('client-video-command', {
        action: action,
        currentTime: video.currentTime || 0
      });
    }

    window.onload = () => {
      console.log("%cSuiHub carregado com sucesso", "color:#e50914;font-size:14px");
    };
  </script>
</body>
</html>
