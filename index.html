<!-- PERFIL + FIRESTORE -->
<script type="module">
  import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    updateDoc,
    collection,
    addDoc,
    query,
    orderBy,
    onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

  const auth = getAuth();
  const db = getFirestore();

  // ========== PERFIL ==========
  const profileBox = document.createElement("div");
  profileBox.className = "card";
  profileBox.style.marginTop = "18px";
  profileBox.innerHTML = `
    <h3>Seu Perfil</h3>
    <div id="profileContent">
      <p class="small">Faça login para ver seu perfil.</p>
    </div>
  `;
  document.querySelector("main").appendChild(profileBox);

  async function loadProfile(user) {
    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      await setDoc(ref, {
        name: user.displayName ?? "Usuário",
        photo: user.photoURL ?? "",
        bio: "Sem bio ainda"
      });
    }

    const data = (await getDoc(ref)).data();

    document.getElementById("profileContent").innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;">
        <img src="${data.photo}" style="width:48px;height:48px;border-radius:50%;"/>
        <div>
          <b>${data.name}</b>
          <div class="small">${data.bio}</div>
        </div>
      </div>

      <textarea id="bioInput" placeholder="Editar bio..." style="
        width:100%;margin-top:10px;background:#020617;
        border:1px solid rgba(255,255,255,0.06);border-radius:8px;
        color:#fff;padding:8px;font-size:14px;min-height:60px"></textarea>

      <button id="saveBio" class="btn btn-primary" style="margin-top:8px;">
        Salvar bio
      </button>
    `;

    document.getElementById("saveBio").onclick = async () => {
      const text = document.getElementById("bioInput").value;
      await updateDoc(ref, { bio: text });
      alert("Bio salva!");
      loadProfile(user);
    };
  }


  // -------- COMENTÁRIOS --------
  const commentsBox = document.createElement("div");
  commentsBox.className = "card";
  commentsBox.style.marginTop = "18px";
  commentsBox.innerHTML = `
    <h3>Comentários</h3>

    <textarea id="commentText" placeholder="Escreva algo..." style="
      width:100%;margin-top:8px;background:#020617;
      border:1px solid rgba(255,255,255,0.06);border-radius:8px;
      color:#fff;padding:8px;font-size:14px;min-height:60px"></textarea>

    <button id="sendComment" class="btn btn-primary" style="margin-top:8px;">
      Enviar
    </button>

    <div id="commentList" style="margin-top:14px;display:flex;flex-direction:column;gap:10px;"></div>
  `;
  document.querySelector("main").appendChild(commentsBox);


  async function sendComment(text) {
    const user = auth.currentUser;
    if (!user) return alert("Faça login primeiro!");

    await addDoc(collection(db, "comments"), {
      uid: user.uid,
      name: user.displayName ?? "Usuário",
      photo: user.photoURL ?? "",
      text,
      createdAt: new Date()
    });
  }

  document.getElementById("sendComment").onclick = () => {
    const text = document.getElementById("commentText").value.trim();
    if (text.length < 1) return;
    sendComment(text);
    document.getElementById("commentText").value = "";
  };


  // LIVE COMMENTS
  const q = query(collection(db, "comments"), orderBy("createdAt", "desc"));
  onSnapshot(q, (snap) => {
    const list = document.getElementById("commentList");
    list.innerHTML = "";
    snap.forEach(doc => {
      const c = doc.data();
      const d = document.createElement("div");
      d.style =
        "background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.05);padding:10px;border-radius:10px;";
      d.innerHTML = `
        <div style="display:flex;gap:10px;align-items:center;">
          <img src="${c.photo}" style="width:34px;height:34px;border-radius:50%;" />
          <b>${c.name}</b>
        </div>
        <div style="margin-top:6px">${c.text}</div>
      `;
      list.appendChild(d);
    });
  });


  // LOGIN WATCH
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  onAuthStateChanged(auth, (user) => {
    if (user) loadProfile(user);
    else {
      document.getElementById("profileContent").innerHTML =
        `<p class="small">Faça login para ver seu perfil.</p>`;
    }
  });

</script>
